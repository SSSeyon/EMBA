<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>EMBA 2027 — Admissions Tracker</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0f1117" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="EMBA 2027" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<script>
/* Runs before any paint so a light-mode user never sees a dark flash.
   Deliberately tiny and dependency-free — it must not wait for anything. */
(function () {
  try {
    var saved = localStorage.getItem('emba-theme');
    var mode = saved || (window.matchMedia &&
      window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    document.documentElement.setAttribute('data-theme', mode);
  } catch (e) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ---------- Theme ----------
   Dark is the default. Light is applied by setting data-theme="light" on
   <html>. Every colour in the app comes from these variables — if you add a
   rule with a literal hex in it, it will break one of the two themes. */
/* The palette is SpendWise's "Classic" scheme, lifted token-for-token from
   that app: deep blue-navy dark, cool blue-grey light, teal accent. */
:root, :root[data-theme="dark"]{
  --ink:#0f1117;        /* page background        */
  --ink-2:#161b25;      /* cards, raised surfaces */
  --ink-3:#1c2333;      /* inputs, hover, chips   */
  --line:#252d3d;       /* borders, rules         */
  --paper:#e8edf5;      /* primary text           */
  --muted:#7d8fa8;      /* secondary text         */
  --accent:#14b8a6;     /* accent: brand, active  */
  --accent-lo:rgba(20,184,166,.10);
  --red:#f87171;        /* overdue / urgent       */
  --red-lo:rgba(248,113,113,.12);
  --amber:#fbbf24;      /* due soon               */
  --amber-lo:rgba(251,191,36,.10);
  --green:#4ade80;      /* done / confirmed       */
  --green-lo:rgba(74,222,128,.10);
  --blue:#60a5fa;       /* links                  */
  --header-bg:rgba(15,17,23,.92);
  --on-accent:#0f1117;  /* text on a filled accent */
  --urgent:rgba(248,113,113,.38); /* urgent card border */
  --banner-ink:#ecdba6;
  --shadow:rgba(0,0,0,.5);
  /* Two-layer shadow: a tight contact line plus a soft wide bloom. Cards
     float on it instead of relying on borders alone. */
  --lift:0 1px 3px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.25);
  --r:10px;
}
:root[data-theme="light"]{
  --ink:#f0f4f8;
  --ink-2:#ffffff;
  --ink-3:#edf0f5;
  --line:#dde3ec;
  --paper:#1a2232;
  --muted:#5a6a80;
  --accent:#0d9488;
  --accent-lo:rgba(13,148,136,.10);
  --red:#ef4444;
  --red-lo:rgba(239,68,68,.10);
  --amber:#d97706;
  --amber-lo:rgba(217,119,6,.10);
  --green:#16a34a;
  --green-lo:rgba(22,163,74,.10);
  --blue:#3b82f6;
  --header-bg:rgba(240,244,248,.92);
  --on-accent:#ffffff;
  --urgent:rgba(239,68,68,.38);
  --banner-ink:#7a5208;
  --shadow:rgba(0,0,0,.14);
  --lift:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html{color-scheme:dark}
html[data-theme="light"]{color-scheme:light}
html,body{background:var(--ink);color:var(--paper);}
body{
  /* Serif for running text is the SpendWise signature — almost no app does
     it, and it is most of why that app feels the way it does. Palatino is a
     system font on every platform, so there is nothing extra to download. */
  font-family:'Book Antiqua','Palatino Linotype',Palatino,Georgia,serif;
  font-size:15px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
  padding-bottom:env(safe-area-inset-bottom);
}
.mono{font-family:'IBM Plex Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums;}
.display{font-family:'Fraunces',Georgia,serif;}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
a{color:var(--blue)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ---------- Shell ---------- */
header{
  position:sticky;top:0;z-index:20;background:var(--header-bg);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
  padding-top:env(safe-area-inset-top);
}
.hwrap{max-width:1240px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:16px}
.brand{font-family:'Fraunces',serif;font-size:19px;font-weight:600;letter-spacing:-.01em;white-space:nowrap}
.brand span{color:var(--accent)}
.ver{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.02em;padding:2px 6px;border:1px solid var(--line);border-radius:6px;white-space:nowrap;opacity:.7}
.ver:hover{opacity:1;color:var(--accent)}
.sync{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--muted);display:flex;align-items:center;gap:6px;white-space:nowrap}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.dot.off{background:var(--muted)}
.spacer{flex:1}
.ghost{font-size:13px;color:var(--muted);padding:7px 12px;border:1px solid var(--line);border-radius:8px}
.ghost:hover{color:var(--paper);border-color:var(--muted)}

/* Icon button — the header theme toggle. 40px square keeps it a comfortable
   thumb target on a phone. */
.iconbtn{
  width:40px;height:40px;flex-shrink:0;display:grid;place-items:center;
  font-size:16px;line-height:1;border:1px solid var(--line);
  border-radius:10px;color:var(--muted);
}
.iconbtn:hover{color:var(--accent);border-color:var(--muted)}
.iconbtn:active{background:var(--ink-3)}

/* Toggle switch — used in Settings for the same theme control. */
.switch{
  position:relative;width:52px;height:30px;flex-shrink:0;border-radius:15px;
  background:var(--ink-3);border:1px solid var(--line);transition:background .18s ease;
}
.switch::after{
  content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;
  border-radius:50%;background:var(--muted);transition:transform .18s ease,background .18s ease;
}
/* Invisible padding so the thumb target clears 44px without making the
   switch itself look oversized. */
/* Invisible tap area. The switch is 30px tall for looks; this pushes the
   touch target past 44px without changing what you see. Rows are 73px
   apart, so neighbouring switches never overlap. */
.switch::before{content:'';position:absolute;inset:-9px -6px}
.switch.on{background:var(--accent);border-color:var(--accent)}
.switch.on::after{transform:translateX(22px);background:var(--on-accent)}

/* ---------- Bottom tab bar ----------
   Thumb-reachable navigation, which is the whole reason it is down here
   rather than under the header: on a tall phone the top of the screen is
   the hardest place to reach. A floating pill detached from the screen
   edge at every width — SpendWise-style — rather than an edge-to-edge
   bar; it grows a little wider on desktop but keeps the same shape. */
nav{
  position:fixed;left:50%;transform:translateX(-50%);z-index:30;
  bottom:calc(12px + env(safe-area-inset-bottom));
  width:min(560px,calc(100% - 24px));
  display:flex;gap:1px;
  padding:5px 6px;
  background:var(--ink-2);border:1px solid var(--line);border-radius:36px;
  box-shadow:var(--lift);
}
.tab{
  flex:1;min-width:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  padding:7px 2px;border-radius:28px;
  font-size:8.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  color:var(--muted);
  /* The overshoot easing gives the active pill a little spring. */
  transition:color .18s cubic-bezier(.34,1.56,.64,1),background .18s cubic-bezier(.34,1.56,.64,1);
}
.tab svg{
  width:21px;height:21px;flex-shrink:0;
  fill:none;stroke:currentColor;stroke-width:1.7;
  stroke-linecap:round;stroke-linejoin:round;
}
.tab span{overflow:hidden;text-overflow:ellipsis;max-width:100%;white-space:nowrap}
.tab.on{color:var(--accent);background:var(--accent-lo)}
.tab:active{opacity:.65}
@media(min-width:641px){
  .tab{font-size:9.5px}
  .tab:hover{color:var(--paper)}
}

/* Clear the bar so the last row of content is never trapped under it. */
main{max-width:1240px;margin:0 auto;padding:24px 20px calc(104px + env(safe-area-inset-bottom))}
.panel{display:none}
.panel.on{display:block}

/* ---------- Countdown hero ---------- */
.hero{
  border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:24px;
  background:linear-gradient(180deg,var(--ink-2),var(--ink));
  box-shadow:var(--lift);
}
.hero-top{padding:20px 22px;display:flex;flex-wrap:wrap;gap:20px;align-items:flex-end}
.eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.11em;color:var(--muted)}
.days{font-family:'Fraunces',serif;font-size:56px;font-weight:700;line-height:.95;letter-spacing:-.03em}
.days.crit{color:var(--red)}
.days.warn{color:var(--amber)}
.days-label{font-size:13px;color:var(--muted);margin-top:6px}
.hero-school{margin-left:auto;text-align:right}
.hero-school .n{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;justify-content:flex-end}
.hero-school .d{font-size:12px;color:var(--muted);margin-top:3px}
.hero-bar{display:flex;border-top:1px solid var(--line)}
.stat{flex:1;padding:13px 16px;border-right:1px solid var(--line);min-width:0;position:relative;overflow:hidden}
.stat:last-child{border-right:none}
/* Each box is its own progress bar: the tint fills left-to-right in
   proportion to the number shown, so the dashboard reads at a glance
   without anyone having to parse four separate figures. */
.statfill{
  position:absolute;left:0;top:0;bottom:0;width:0;
  background:var(--accent-lo);transition:width .45s cubic-bezier(.4,0,.2,1);
}
.statfill.green{background:var(--green-lo)}
.statfill.red{background:var(--red-lo)}
.stat .k,.stat .v{position:relative;z-index:1}
.stat .k{font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted)}
.stat .v{font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:600;margin-top:3px;font-variant-numeric:tabular-nums}

/* ---------- Progress ---------- */
.pwrap{height:5px;background:var(--ink-3);border-radius:3px;overflow:hidden}
.pbar{height:100%;background:var(--accent);border-radius:3px;transition:width .3s ease}
.pbar.done{background:var(--green)}

/* ---------- Section ---------- */
.sechead{display:flex;align-items:baseline;gap:12px;margin:28px 0 12px}
.sechead h2{font-family:'Fraunces',serif;font-size:21px;font-weight:600;letter-spacing:-.01em}
.sechead .c{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)}
.sechead:first-child{margin-top:0}

/* ---------- Cards ---------- */
.grid{display:grid;gap:12px}
.card{
  border:1px solid var(--line);border-radius:12px;background:var(--ink-2);overflow:hidden;
  box-shadow:var(--lift);
}
.card.urgent{border-color:var(--urgent)}
.chead{padding:14px 16px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;user-select:none}
.chead:hover{background:var(--ink-3)}
.cname{font-weight:600;font-size:15px;letter-spacing:-.01em}

/* School logo — sits in front of the name. Any square-ish image works;
   see the "School logos" block in the JS below for where they come from. */
.logo{
  width:30px;height:30px;border-radius:7px;flex-shrink:0;display:block;
  object-fit:contain;background:var(--ink-3);
}
.cmeta{font-size:12px;color:var(--muted);margin-top:4px;display:flex;flex-wrap:wrap;gap:5px 10px}
.cright{margin-left:auto;text-align:right;flex-shrink:0}
.cdays{font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:600;font-variant-numeric:tabular-nums}
.cdays.crit{color:var(--red)}
.cdays.warn{color:var(--amber)}
.cdays.ok{color:var(--muted)}
.cprog{font-size:11px;color:var(--muted);margin-top:3px}
.caret{color:var(--muted);font-size:11px;transition:transform .2s;flex-shrink:0;margin-top:4px}
.card.open .caret{transform:rotate(90deg)}
.cbody{display:none;border-top:1px solid var(--line);padding:6px 16px 14px}
.card.open .cbody{display:block}
.cinfo{font-size:12px;color:var(--muted);padding:10px 0;line-height:1.65;border-bottom:1px solid var(--line);margin-bottom:6px}
.cinfo b{color:var(--paper);font-weight:500}

/* ---------- Pills ---------- */
.pill{
  display:inline-block;font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:.07em;padding:2px 7px;border-radius:4px;white-space:nowrap;
}
.p-URGENT{background:var(--red-lo);color:var(--red)}
.p-HIGH{background:var(--amber-lo);color:var(--amber)}
.p-AMBER{background:var(--amber-lo);color:var(--amber)}
.p-STANDARD{background:var(--ink-3);color:var(--muted)}
.w-Green{background:var(--green-lo);color:var(--green)}
.w-Amber{background:var(--amber-lo);color:var(--amber)}
.w-Red{background:var(--red-lo);color:var(--red)}
/* Flags and the estimates banner are warnings, so they stay amber — the
   teal accent is for brand and active states, not caution. */
.flag{background:var(--amber-lo);color:var(--amber);font-size:11px;padding:6px 9px;border-radius:6px;margin:8px 0;display:block;line-height:1.5}
.est{color:var(--muted);font-weight:400}
.est::before{content:'~';margin-right:1px;opacity:.7}
.banner{
  border:1px solid var(--amber);background:var(--amber-lo);border-radius:10px;
  padding:12px 14px;margin-bottom:18px;font-size:12.5px;line-height:1.6;color:var(--banner-ink);
}
.banner b{color:var(--amber)}

/* ---------- Tasks ---------- */
.task{display:flex;align-items:flex-start;gap:11px;padding:8px 0;font-size:14px}
.task+.task{border-top:1px solid var(--line)}
.cb{
  width:18px;height:18px;border:1.5px solid var(--muted);border-radius:5px;
  flex-shrink:0;margin-top:1px;display:grid;place-items:center;
  transition:all .15s;background:transparent;
}
.cb:hover{border-color:var(--accent)}
.cb.on{background:var(--green);border-color:var(--green)}
.cb.on::after{content:'✓';color:var(--on-accent);font-size:12px;font-weight:700;line-height:1}
.tlabel{flex:1;min-width:0;line-height:1.45}
.task.done .tlabel{color:var(--muted);text-decoration:line-through}
.tdue{
  font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);
  flex-shrink:0;margin-top:2px;font-variant-numeric:tabular-nums;
}
.tdue.crit{color:var(--red)}
.tdue.warn{color:var(--amber)}
.task.done .tdue{color:var(--muted);opacity:.5}
.tdel{color:var(--muted);font-size:12px;padding:2px 5px;flex-shrink:0;margin-top:1px;border-radius:4px}
.tdel:hover{color:var(--red);background:var(--red-lo)}
.addtask{font-size:12px;margin-top:8px;padding:6px 10px}

/* ---------- Notes ---------- */
.notes{
  width:100%;margin-top:8px;background:var(--ink-3);border:1px solid var(--line);border-radius:8px;
  color:var(--paper);font:inherit;font-size:13px;padding:9px 11px;min-height:56px;resize:vertical;
}
.notes:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
.noteslabel{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);display:block;margin-top:12px}

/* ---------- Deadline edit ---------- */
.dledit{display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:8px 0}
.dledit input[type=date]{
  background:var(--ink-3);border:1px solid var(--line);border-radius:6px;color:var(--paper);
  font:inherit;font-size:13px;padding:5px 8px;
}
.dledit label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
.editlink{font-size:11px;color:var(--blue);margin-left:8px;text-decoration:underline;text-underline-offset:2px}

/* ---------- Table ---------- */
.tscroll{overflow-x:auto;border:1px solid var(--line);border-radius:12px;-webkit-overflow-scrolling:touch;box-shadow:var(--lift)}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:620px}
th{
  background:var(--ink-3);padding:10px 13px;text-align:left;font-size:10px;
  text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600;white-space:nowrap;
}
td{padding:11px 13px;border-top:1px solid var(--line);vertical-align:top}
tbody tr:hover{background:var(--ink-2)}
td.num{font-family:'IBM Plex Mono',monospace;text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
/* A right-aligned column needs a right-aligned heading, or the header sits
   adrift from the digits it labels. */
th.num{text-align:right}

/* Small logo used in the dashboard runway table and next to the hero school. */
.logo-sm{width:22px;height:22px;border-radius:5px}
.tname{display:flex;align-items:center;gap:9px;min-width:0}

/* ---------- Chips ----------
   SpendWise-style outlined pills, used for the task filter, the this-week
   window and the compare picker. Active = accent tint, like the nav. */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 12px}
.chip{
  padding:6px 12px;min-height:32px;border-radius:20px;border:1px solid var(--line);
  font-size:11px;font-weight:600;color:var(--muted);background:transparent;
  transition:.13s;
}
.chip.on{border-color:var(--accent);background:var(--accent-lo);color:var(--accent)}
.chip:active{opacity:.7}

/* Search box for the task filter. */
.qbox{
  display:flex;align-items:center;gap:8px;border:1px solid var(--line);
  border-radius:10px;background:var(--ink-2);padding:0 12px;margin-bottom:10px;
}
.qbox:focus-within{border-color:var(--accent)}
.qbox input{flex:1;min-width:0;background:none;border:none;color:var(--paper);font:inherit;font-size:14px;padding:11px 0}
.qbox input:focus{outline:none}
.qbox .qx{color:var(--muted);font-size:13px;padding:6px}

/* ---------- Recommenders ---------- */
.recrow{display:flex;align-items:center;gap:10px;padding:9px 0;font-size:13px}
.recrow+.recrow{border-top:1px solid var(--line)}
.recname{flex:1;min-width:0}
.recmeta{font-size:11px;color:var(--muted);margin-top:2px}
/* The status pill is the control: tapping it advances ask → agreed →
   drafting → submitted and wraps around. */
.recst{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  padding:5px 10px;min-height:28px;border-radius:20px;border:1px solid var(--line);
  color:var(--muted);flex-shrink:0;
}
.recst.st-agreed{color:var(--blue);border-color:var(--blue)}
.recst.st-drafting{color:var(--amber);border-color:var(--amber);background:var(--amber-lo)}
.recst.st-submitted{color:var(--green);border-color:var(--green);background:var(--green-lo)}
.chase{font-size:11px;color:var(--blue);text-decoration:underline;text-underline-offset:2px;padding:4px 0;flex-shrink:0}

/* ---------- Funding pots ---------- */
.pots{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:12px}
.pot{border:1px solid var(--line);border-radius:10px;background:var(--ink-2);padding:10px 12px;box-shadow:var(--lift)}
.pot:focus-within{border-color:var(--accent)}
.pot label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);display:block}
.pot input{
  width:100%;background:none;border:none;color:var(--paper);
  font-family:'IBM Plex Mono',monospace;font-size:15px;padding:6px 0 0;
  -moz-appearance:textfield;
}
.pot input:focus{outline:none}
.pot input::-webkit-outer-spin-button,.pot input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.gap-ok{color:var(--green);font-weight:600}
.gap-short{color:var(--red);font-weight:600}

/* ---------- Rounds editor (inside the deadline edit block) ---------- */
.rline{display:flex;gap:8px;align-items:center;margin:6px 0;flex-basis:100%}
.dledit input[type=text],.dledit input[type=number]{
  background:var(--ink-3);border:1px solid var(--line);border-radius:6px;
  color:var(--paper);font:inherit;font-size:13px;padding:5px 8px;width:72px;
}
.rline .rx{color:var(--muted);font-size:12px;padding:4px 7px;border-radius:4px}
.rline .rx:hover{color:var(--red);background:var(--red-lo)}

/* ---------- Settings ---------- */
.set{border:1px solid var(--line);border-radius:12px;background:var(--ink-2);padding:4px 16px;margin-bottom:14px}
.setrow{display:flex;align-items:center;gap:14px;padding:14px 0;border-top:1px solid var(--line)}
.setrow:first-child{border-top:none}
.setlbl{flex:1;min-width:0}
/* Direct child only — a <b> used for emphasis inside the description text
   must stay inline, not become another heading. */
.setlbl > b{display:block;font-size:14px;font-weight:600}
.setlbl > span{display:block;font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5}
.setlbl > span b{color:var(--paper);font-weight:600}
.setbtn{
  font-size:13px;font-weight:500;padding:11px 15px;min-height:44px;flex-shrink:0;
  border:1px solid var(--line);border-radius:10px;color:var(--paper);background:var(--ink-3);
}
.setbtn:hover{border-color:var(--accent);color:var(--accent)}
.setbtn:active{opacity:.7}
.setnote{font-size:11.5px;color:var(--muted);line-height:1.6;padding:0 0 14px}

/* Exchange-rate field. */
.fxbox{
  display:flex;align-items:center;gap:6px;flex-shrink:0;
  border:1px solid var(--line);border-radius:10px;background:var(--ink-3);
  padding:0 11px;min-height:44px;
}
.fxbox:focus-within{border-color:var(--accent)}
.fxsym,.fxper{font-size:13px;color:var(--muted);flex-shrink:0}
.fxbox input{
  width:88px;background:none;border:none;color:var(--paper);
  font-family:'IBM Plex Mono',monospace;font-size:14px;text-align:right;
  padding:11px 0;-moz-appearance:textfield;
}
.fxbox input:focus{outline:none}
.fxbox input::-webkit-outer-spin-button,
.fxbox input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

/* One row per school in the logo picker. Buttons stay side by side even on
   a narrow phone — they are short, and stacking them would make this list
   18 screens long. */
/* The logo itself is the button for changing it. A separate "Choose" button
   per row would push each row onto two lines, and 18 of those is a very
   long scroll on a phone. */
.logobtn{
  position:relative;flex-shrink:0;width:44px;height:44px;
  display:grid;place-items:center;border-radius:10px;
}
.logobtn .logo{width:34px;height:34px}
.logobtn::after{
  content:'';position:absolute;right:1px;bottom:1px;width:13px;height:13px;
  border-radius:50%;background:var(--ink-3);border:1px solid var(--line);
  background-image:linear-gradient(var(--muted),var(--muted));
  background-size:7px 1.5px;background-position:center;background-repeat:no-repeat;
  box-shadow:0 0 0 2px var(--ink-2);
}
.logobtn:active{opacity:.6}
.logosrc{font-family:'IBM Plex Mono',monospace;font-size:11px}
.resetlink{
  font-size:11px;color:var(--blue);text-decoration:underline;
  padding:4px 0;margin-top:2px;display:inline-block;
}
/* An excluded school stays listed here — greyed, not hidden — so you can
   always find it again to switch it back on. */
.logorow.off .logo,.logorow.off .setlbl > b{opacity:.4}
.logorow.off .setlbl > b{text-decoration:line-through}

/* ---------- Empty ---------- */
.empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:14px;border:1px dashed var(--line);border-radius:12px}

/* ---------- Toast ---------- */
#toast{
  position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(120%);
  background:var(--ink-3);border:1px solid var(--line);border-radius:10px;
  padding:11px 18px;font-size:13px;z-index:50;transition:transform .25s ease;
  box-shadow:0 8px 28px var(--shadow);max-width:calc(100vw - 40px);
}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ---------- Phone ----------
   Primary target is a Galaxy S24 Ultra (~412 CSS px wide). Tap targets are
   kept at 44px or more, and anything that would force sideways scrolling of
   the page itself is stacked instead. */
@media(max-width:640px){
  main{padding:18px 14px calc(92px + env(safe-area-inset-bottom))}
  .hwrap{padding:10px 14px;gap:9px}
  .days{font-size:44px}
  .hero-top{padding:16px}
  .hero-school{margin-left:0;text-align:left;width:100%}
  .hero-school .n{justify-content:flex-start}
  .hero-bar{flex-wrap:wrap}
  .stat{min-width:50%;border-bottom:1px solid var(--line)}
  .brand{font-size:16px}
  .sync span{display:none}
  .chead{padding:13px 14px;gap:10px}
  .cbody{padding:6px 14px 14px}
  .logo{width:28px;height:28px}
  .task{padding:10px 0}
  .cb{width:22px;height:22px}
  .setrow{gap:10px}
  .setbtn{padding:11px 13px}
}

/* Narrow phones — stack each settings row so the button keeps its full
   width instead of squeezing the label. */
@media(max-width:430px){
  .setrow{flex-wrap:wrap}
  .setlbl{flex:1 1 100%}
  .setrow .setbtn{width:100%}
  .setrow .switch{margin-left:auto}
  /* Keep the logo rows on one line. The generic rule above stretches
     buttons to full width, which would turn this 18-row list into a very
     long scroll and squeeze the school name into three lines. */
  .logorow .setbtn{width:auto;flex:0 0 auto}
  .logorow .setlbl{flex:1 1 0}
}
</style>
</head>
<body>

      <div class="spacer"></div>

<!-- Bottom tab bar. Deliberately a direct child of <body>, NOT inside
     <header>: an ancestor with backdrop-filter becomes the containing block

<nav>

    <span>Costs</span>
  </button>
  <button class="tab" data-p="settings">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16"/><path d="M4 17h16"/><circle cx="9.5" cy="7" r="2.2"/><circle cx="15" cy="17" r="2.2"/></svg>
    <span>Settings</span>
  </button>
</nav>

<div id="toast"></div>

<script src="seed.js"></script>
<script type="module" src="sync.js"></script>
<script>
/* ================================================================
   Storage — everything lives in this browser's localStorage under
   one key. No accounts, no server. Use Backup / Restore to move
   your data between browsers or devices.
   ================================================================ */
const STORE_KEY = 'emba-tracker-v' + SEED_VERSION;

/* App version — bump this and CACHE_VERSION in sw.js together whenever
   index.html / seed.js / sync.js change. Shown in the header; clicking it
   hard-refreshes (drops the service-worker caches and reloads). */
const APP_VERSION = 'v1.12.0';

/* ---------------- State ---------------- */
let data = null;
const $  = (s) => document.querySelector(s);
const $$ = (s) => Array.from(document.querySelectorAll(s));

/* ---------------- Utils ---------------- */
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c =>
  ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));

function today() { const d = new Date(); d.setHours(0,0,0,0); return d; }

/* Today as YYYY-MM-DD in LOCAL time. toISOString() would convert to UTC
   first, which west of Greenwich — or at midnight in Lagos — lands on the
   wrong day. */
function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') +
    '-' + String(d.getDate()).padStart(2, '0');
}

function daysTo(iso) {
  if (!iso) return null;
  const d = new Date(iso + 'T00:00:00');
  if (isNaN(d)) return null;
  return Math.round((d - today()) / 86400000);
}

function dueClass(n) {
  if (n === null) return '';
  if (n < 0)  return 'crit';
  if (n <= 14) return 'crit';
  if (n <= 45) return 'warn';
  return 'ok';
}

function dueText(n) {
  if (n === null) return '—';
  if (n < 0)   return `${Math.abs(n)}d over`;
  if (n === 0) return 'Today';
  if (n === 1) return '1 day';
  return `${n} days`;
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso + 'T00:00:00');
  if (isNaN(d)) return '—';
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}

/* ---------------- Money formatting ----------------
   Every cost in seed.js is held in USD. If you have set an exchange rate in
   Settings, the naira equivalent is shown in brackets beside every figure.
   No rate set means no brackets: the app will not invent a rate, because a
   stale guess is worse than no number at all. */
function fxRate() {
  const r = Number(data && data.fx && data.fx.ngnPerUsd);
  return r > 0 ? r : null;
}

/* Naira figures for a £100k course run to nine digits, which would wreck a
   table column, so anything over a thousand is abbreviated. */
function ngn(usdAmount) {
  const rate = fxRate();
  if (rate === null) return '';
  const n = Number(usdAmount || 0) * rate;
  if (n >= 1e9) return '₦' + (n / 1e9).toFixed(n < 1e10 ? 2 : 1) + 'bn';
  if (n >= 1e6) return '₦' + (n / 1e6).toFixed(n < 1e7 ? 1 : 0) + 'm';
  if (n >= 1e3) return '₦' + Math.round(n / 1e3).toLocaleString('en-GB') + 'k';
  return '₦' + Math.round(n);
}

const usdOnly = (n) => '$' + Number(n || 0).toLocaleString('en-GB');

/* The standard money renderer used everywhere a figure appears. */
function usd(n) {
  const naira = ngn(n);
  return usdOnly(n) + (naira ? ` (${naira})` : '');
}

/* ---------------- Excluded schools ----------------
   A school you switch off in Settings stays in your data — it is only
   filtered out of the lists and the counts. Nothing is deleted, so
   switching it back on restores its ticks and notes untouched. */
function isExcluded(id) {
  return !!(data && data.excluded && data.excluded[id]);
}
function activeSchools() {
  return (data.schools || []).filter((s) => !isExcluded(s.id));
}

function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2400);
}

function pct(tasks) {
  if (!tasks || !tasks.length) return 0;
  return Math.round(tasks.filter(t => t.done).length / tasks.length * 100);
}

/* ---------------- Load, seed, persist ---------------- */
function loadData() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {
    console.error('Could not read saved data', e);
  }
  return null;
}

let applyingRemote = false;

function save() {
  if (!data) return;
  data.updatedAt = Date.now();
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(data));
  } catch (e) {
    console.error('Save failed', e);
    toast('Could not save — browser storage is full or blocked');
  }
  if (window.EmbaSync && !applyingRemote) window.EmbaSync.push(data);
}

/* Add anything new in seed.js (schools/steps/actions/funding you add later,
   fields on existing records) to an existing save, without touching ticks,
   notes, or edited deadlines already there. Runs on every load; cheap no-op
   once nothing's missing. */
function migrate(d) {
  let changed = false;
  const seed = buildSeed();

  (d.schools || []).forEach((s) => {
    if (s.notes === undefined) { s.notes = ''; changed = true; }
    if (!Array.isArray(s.recs))   { s.recs = [];   changed = true; }
    if (!Array.isArray(s.rounds)) { s.rounds = []; changed = true; }
    if (s.appFeeUsd === undefined) { s.appFeeUsd = null; changed = true; }
  });

  // Intake alignment — the target is programmes starting in 2027. Earlier
  // seed data carried 2026 start dates (and a Cambridge countdown built
  // around the Sep 2026 intake). Each field is rewritten only if it still
  // holds the old seed value, so anything you edited by hand is left alone.
  const START_2027 = {
    'cambridge-emba':   ['Sep 2026', 'Sep 2027'],
    'insead-gemba':     ['Nov 2026', 'Nov 2027'],
    'oxford-said':      ['20 Sep 2026 / 17 Jan 2027', 'Jan 2027 / Sep 2027'],
    'lbs-emba':         ['Sep 2026', 'Sep 2027'],
    'trium':            ['6 Sep 2026', 'Sep 2027'],
    'booth-emba':       ['Sep 2026', 'Sep 2027'],
    'wharton-emba':     ['~May 2026', '~May 2027'],
    'columbia-lbs':     ['May 2026', 'May 2027'],
    'kellogg-emba':     ['Jan/Sep', 'Jan/Sep 2027'],
    'mit-sloan':        ['~Jul 2026', '~Jul 2027'],
    'escp-emba':        ['Sep 2026 / Jan 2027', 'Jan 2027 / Sep 2027'],
    'sda-bocconi':      ['Late 2026', 'Late 2027'],
    'imperial-emba':    ['Sep/Oct 2026', 'Sep/Oct 2027'],
    'manchester-gemba': ['Jan/Jul', 'Jan/Jul 2027'],
  };
  (d.schools || []).forEach((s) => {
    const m = START_2027[s.id];
    if (m && s.start === m[0]) { s.start = m[1]; changed = true; }
    if (s.id === 'cambridge-emba' && s.deadline === '2026-08-15') {
      s.deadline = '2026-11-15';
      s.deadlineNote = 'R1 estimate for Sep 2027 start — verify with Judge';
      s.flag = 'This deadline is an estimate for the Sep 2027 intake, not a confirmed date. Contact Cambridge Judge admissions to confirm round dates.';
      if (s.priority === 'URGENT') s.priority = 'HIGH';
      const st = (s.tasks || []).find((t) => t.id === 'submit');
      if (st && st.due === '2026-08-15') st.due = '2026-11-15';
      changed = true;
    }
    if (s.id === 'insead-gemba' && s.deadline === '2026-09-15') {
      s.deadline = '2027-02-15';
      s.deadlineNote = 'R1 estimate for Nov 2027 intake — confirm with INSEAD';
      s.estimated = true;
      const st = (s.tasks || []).find((t) => t.id === 'submit');
      if (st && st.due === '2026-09-15') st.due = '2027-02-15';
      changed = true;
    }
    if (s.id === 'imd-emba' && s.deadlineNote === 'Round 5') {
      s.deadlineNote = 'Round 5 — confirm it feeds a 2027 start';
      changed = true;
    }
  });
  const a1 = (d.actions || []).find((a) => a.id === 'a1');
  if (a1 && a1.label === 'Apply to Cambridge Judge EMBA (Sep 2026 start)') {
    a1.label = 'Apply to Cambridge Judge EMBA (Sep 2027 start)';
    if (a1.due === '2026-08-15') a1.due = '2026-11-15';
    changed = true;
  }

  ['schools', 'steps', 'actions'].forEach((key) => {
    d[key] = d[key] || [];
    const have = new Set(d[key].map((x) => x.id));
    (seed[key] || []).forEach((item) => {
      if (!have.has(item.id)) { d[key].push(item); changed = true; }
    });
  });

  d.funding = d.funding || [];
  const haveFunding = new Set(d.funding.map((f) => f.name));
  (seed.funding || []).forEach((f) => {
    if (!haveFunding.has(f.name)) { d.funding.push(f); changed = true; }
  });

  if (!d.logos || typeof d.logos !== 'object') { d.logos = {}; changed = true; }
  if (!d.excluded || typeof d.excluded !== 'object') { d.excluded = {}; changed = true; }
  if (!d.fx || typeof d.fx !== 'object') { d.fx = { ngnPerUsd: null }; changed = true; }
  // Funding pots — the four "how will I pay for it" numbers on the Costs tab.
  if (!d.pots || typeof d.pots !== 'object') {
    d.pots = { savings: null, employer: null, scholarship: null, loan: null };
    changed = true;
  }

  if (d.seedVersion !== SEED_VERSION) { d.seedVersion = SEED_VERSION; changed = true; }
  return changed;
}

/* ---------------- Application rounds ----------------
   A school can carry a list of round dates (R1/R2/R3…). The tracked
   deadline (s.deadline) always points at the round currently being aimed
   for. When that date passes and a later round exists, this rolls the
   tracker forward to it — on load, not mid-session, so a date never jumps
   while you are looking at it. The missed date is kept in s.rolledFrom so
   the school card can say so instead of silently moving the goalposts. */
function sortedRounds(s) {
  return (s.rounds || []).filter(r => r.date)
    .slice().sort((a, b) => (a.date < b.date ? -1 : 1));
}

function rollRounds(d) {
  let changed = false;
  (d.schools || []).forEach(s => {
    const rs = sortedRounds(s);
    if (!rs.length || !s.deadline) return;
    if (daysTo(s.deadline) >= 0) return;              // still live — nothing to do
    const up = rs.find(r => daysTo(r.date) >= 0);     // next round still open
    if (!up || up.date <= s.deadline) return;
    s.rolledFrom = s.deadline;
    s.deadline = up.date;
    if (up.label) s.deadlineNote = up.label;
    const st = (s.tasks || []).find(t => t.id === 'submit');
    if (st) st.due = up.date;
    changed = true;
  });
  return changed;
}

function setSyncStatus(kind) {
  const dot = $('#dot'), txt = $('#syncTxt');
  if (kind === 'synced')        { dot.className = 'dot';     txt.textContent = 'Synced'; }
  else if (kind === 'connecting') { dot.className = 'dot';   txt.textContent = 'Syncing…'; }
  else if (kind === 'error')    { dot.className = 'dot off'; txt.textContent = 'Sync error'; }
  else if (kind === 'unconfigured') { dot.className = 'dot off'; txt.textContent = 'Sync not set up'; }
  else                           { dot.className = 'dot';     txt.textContent = 'On this device'; }
}

function handleRemote(remote) {
  if (!remote || applyingRemote) return;
  if (!data || (remote.updatedAt || 0) > (data.updatedAt || 0)) {
    applyingRemote = true;
    data = remote;
    if (migrate(data)) { /* saved locally below */ }
    try { localStorage.setItem(STORE_KEY, JSON.stringify(data)); } catch (e) {}
    render();
    applyingRemote = false;
  }
}

function waitForSync(cb, tries = 0) {
  if (window.EmbaSync) cb();
  else if (tries < 50) setTimeout(() => waitForSync(cb, tries + 1), 100);
}

/* Sync connects itself on load — nothing to turn on, nothing to enter.
   Every device reads and writes the same Firestore document. */
async function connectSync() {
  if (!window.EmbaSync || !window.EmbaSync.available()) {
    setSyncStatus('unconfigured');
    return;
  }
  setSyncStatus('connecting');
  await window.EmbaSync.connect({ onRemote: handleRemote, onStatus: setSyncStatus });
  // Give the first remote pull a moment to land, then take the daily
  // snapshot of whatever the merged truth is (once per day; see below).
  setTimeout(() => maybeSnapshot(), 6000);
}

/* ---------------- Theme (dark / light) ----------------
   Dark is the default. If the user has never chosen, we follow the phone's
   own setting; once they pick, their choice sticks and stops following it.
   Applied to <html> rather than <body> so the background is right before
   the first paint (see the inline script in <head>). */
const THEME_KEY = 'emba-theme';

function currentTheme() {
  return document.documentElement.getAttribute('data-theme') || 'dark';
}

function applyTheme(mode) {
  document.documentElement.setAttribute('data-theme', mode);
  const isLight = mode === 'light';
  // Sun when light is active, moon when dark — showing the state, not the action.
  const btn = $('#theme');
  if (btn) {
    btn.textContent = isLight ? '☀' : '☾';
    btn.title = isLight ? 'Light mode — tap for dark' : 'Dark mode — tap for light';
  }
  // Keep the Android status bar in step with the app.
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', isLight ? '#f0f4f8' : '#0f1117');
  // The Settings control is labelled "Light mode", so it reads as on when
  // light is the active theme.
  const sw = $('#themeSwitch');
  if (sw) {
    sw.className = 'switch' + (isLight ? ' on' : '');
    sw.setAttribute('aria-checked', isLight ? 'true' : 'false');
  }
}

function toggleTheme() {
  const next = currentTheme() === 'light' ? 'dark' : 'light';
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
}

$('#theme').addEventListener('click', toggleTheme);
window.__toggleTheme = toggleTheme;
applyTheme(currentTheme());

/* ---------------- Version badge / hard refresh ---------------- */
$('#ver').textContent = APP_VERSION;

$('#ver').addEventListener('click', async () => {
  toast('Refreshing…');
  // Your data lives in localStorage and is NOT touched here — this only
  // drops the cached copies of index.html / seed.js / sync.js etc. so the
  // browser is forced to re-fetch them.
  try {
    if (window.caches) {
      const keys = await caches.keys();
      await Promise.all(keys.map((k) => caches.delete(k)));
    }
    if (navigator.serviceWorker) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map((r) => r.unregister()));
    }
  } catch (e) {
    console.error('Cache clear failed', e);
  }
  location.reload();
});

function start() {
  data = loadData();
  if (!data) {
    data = buildSeed();
    save();
    toast('Tracker set up with your 18 schools');
  } else {
    const migrated = migrate(data);
    const rolled = rollRounds(data);
    if (migrated || rolled) save();
    if (rolled) toast('A missed round rolled forward to the next one — see the school card');
  }
  render();

  waitForSync(() => connectSync());
}

/* ---------------- Backup / restore ---------------- */
window.__backup = () => {
  if (!data) return;
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `emba-tracker-backup-${today().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Backup downloaded');
};

window.__restore = () => $('#importFile').click();

$('#importFile').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  try {
    const parsed = JSON.parse(await file.text());
    if (!Array.isArray(parsed.schools) || !Array.isArray(parsed.actions)) {
      toast('That file is not an EMBA tracker backup'); return;
    }
    if (!confirm('Replace everything in this browser with the backup file? Your current ticks will be overwritten.')) return;
    data = parsed;
    save();
    render();
    toast('Backup restored');
  } catch (err) {

    toast('Could not read that file');
  }
});

/* ---------------- Notes (per school) ---------------- */
$('#p-schools').addEventListener('change', (e) => {
  if (!e.target.classList.contains('notes')) return;

/* ---------------- Calendar export ---------------- */
const icsEsc = (s) => String(s).replace(/\\/g, '\\\\').replace(/;/g, '\\;').replace(/,/g, '\\,').replace(/\n/g, '\\n');
const toICSDate = (iso) => iso.replace(/-/g, '');

function buildICS() {
  const stamp = new Date().toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
  const lines = ['BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//EMBA Tracker//EN', 'CALSCALE:GREGORIAN'];

  activeSchools().forEach(s => {
    if (!s.deadline || pct(s.tasks) === 100) return;
    lines.push(
      'BEGIN:VEVENT',
      'UID:school-' + s.id + '@emba-tracker',
      'DTSTAMP:' + stamp,
      'DTSTART;VALUE=DATE:' + toICSDate(s.deadline),
      'SUMMARY:' + icsEsc((s.estimated ? '[Estimated] ' : '') + s.name + ' — application deadline'),
      'DESCRIPTION:' + icsEsc(s.deadlineNote || ''),
      'END:VEVENT'
    );
  });

  (data.actions || []).forEach(t => {
    if (t.done || !t.due) return;
    lines.push(
      'BEGIN:VEVENT',
      'UID:action-' + t.id + '@emba-tracker',
      'DTSTAMP:' + stamp,
      'DTSTART;VALUE=DATE:' + toICSDate(t.due),
      'SUMMARY:' + icsEsc(t.label),
      'END:VEVENT'
    );
  });

  lines.push('END:VCALENDAR');
  return lines.join('\r\n');
}

window.__calendar = () => {
  if (!data) return;
  const blob = new Blob([buildICS()], { type: 'text/calendar;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'emba-deadlines.ics';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Calendar file downloaded — import it into your phone calendar');
};

/* ---------------- Toggle a task ---------------- */
window.__toggle = (scope, containerId, taskId) => {
  if (!data) return;
  let arr;
  if (scope === 'actions') {
    arr = data.actions;
  } else {
    const parent = (data[scope] || []).find(x => x.id === containerId);
    if (!parent) return;
    arr = parent.tasks;
  }
  const task = (arr || []).find(t => t.id === taskId);
  if (!task) return;
  task.done = !task.done;
  render();
  save();
};

/* ---------------- Custom tasks ---------------- */
function taskArrFor(scope, containerId) {
  if (scope === 'actions') return data.actions;
  const parent = (data[scope] || []).find(x => x.id === containerId);
  return parent ? parent.tasks : null;
}

window.__addTask = (scope, containerId) => {
  if (!data) return;
  const label = prompt('Task description:');
  if (!label || !label.trim()) return;
  const due = prompt('Due date as YYYY-MM-DD (leave blank for none):');
  if (due && !/^\d{4}-\d{2}-\d{2}$/.test(due.trim())) { toast('Date must look like 2026-09-30 — task not added'); return; }
  const arr = taskArrFor(scope, containerId);
  if (!arr) return;
  arr.push({ id: 'custom-' + Date.now(), label: label.trim(), due: due ? due.trim() : null, done: false, custom: true });
  render();
  save();
};

window.__delTask = (scope, containerId, taskId) => {
  if (!data) return;
  if (!confirm('Delete this task?')) return;
  const arr = taskArrFor(scope, containerId);
  if (!arr) return;
  const idx = arr.findIndex(t => t.id === taskId);
  if (idx > -1) arr.splice(idx, 1);
  render();
  save();
};

/* ---------------- Deadline editing ---------------- */
const editingDL = new Set();
window.__editDL = (id) => {
  editingDL.has(id) ? editingDL.delete(id) : editingDL.add(id);
  renderSchools();
};
/* Read whatever is currently typed in the rounds editor back into the data,
   so adding/removing a line doesn't wipe the others on re-render. */
function harvestRounds(id) {
  const s = (data.schools || []).find(x => x.id === id);
  const box = $('#rounds-' + id);
  if (!s || !box) return s;
  s.rounds = Array.from(box.querySelectorAll('.rline')).map(row => ({
    label: row.querySelector('.rlab').value.trim(),
    date:  row.querySelector('.rdate').value || null,
  })).filter(r => r.label || r.date);
  return s;
}

window.__addRound = (id) => {
  const s = harvestRounds(id);
  if (!s) return;
  s.rounds.push({ label: 'R' + (s.rounds.length + 1), date: null });
  renderSchools();
};

window.__delRound = (id, i) => {
  const s = harvestRounds(id);
  if (!s || !s.rounds[i]) return;
  s.rounds.splice(i, 1);
  renderSchools();
};

window.__saveDL = (id) => {
  const s = harvestRounds(id);
  if (!s) return;
  const dateVal = $('#dl-date-' + id).value;
  const confirmed = $('#dl-conf-' + id).checked;
  const feeVal = parseFloat($('#dl-fee-' + id).value);
  s.appFeeUsd = isFinite(feeVal) && feeVal >= 0 ? feeVal : null;
  if (dateVal) s.deadline = dateVal;
  s.estimated = !confirmed;
  delete s.rolledFrom;               // an explicit edit resets the missed-round note
  // If rounds are set, the next upcoming round becomes the tracked deadline —
  // one source of truth for the runway, the calendar and the submit task.
  const up = sortedRounds(s).find(r => daysTo(r.date) >= 0);
  if (up) {
    s.deadline = up.date;
    if (up.label) s.deadlineNote = up.label;
  }
  const submitTask = (s.tasks || []).find(t => t.id === 'submit');
  if (submitTask && s.deadline) submitTask.due = s.deadline;
  editingDL.delete(id);
  render();
  save();
  toast(up ? `Tracking ${up.label || 'next round'} — ${fmtDate(up.date)}` : 'Deadline updated');
};

/* Display-only state — none of this syncs; it is how you are looking at the

let uiWin = 7;                     // the due-soon window: 7 or 14 days

function renderDash() {
  const schools = activeSchools();
  const steps   = data.steps   || [];
  const actions = data.actions || [];

  const live = schools
    .map(s => ({ s, n: daysTo(s.deadline), done: pct(s.tasks) === 100 }))
    .filter(x => x.n !== null && !x.done)
    .sort((a, b) => a.n - b.n);
  const next = live[0];

  const allTasks = [
    ...schools.flatMap(s => s.tasks || []),
    ...steps.flatMap(s => s.tasks || []),
    ...actions
  ];
  const doneCount = allTasks.filter(t => t.done).length;
  const overall = allTasks.length ? Math.round(doneCount / allTasks.length * 100) : 0;

  const submitted = schools.filter(s => (s.tasks || []).find(t => t.id === 'submit')?.done).length;

  // Due in next 14 days, not done
  const soon = [];
  schools.forEach(s => (s.tasks || []).forEach(t => {
    const n = daysTo(t.due);
    if (!t.done && n !== null && n <= 14) soon.push({ n, label: t.label, ctx: s.name, scope:'schools', cid:s.id, t });
  }));
  steps.forEach(s => (s.tasks || []).forEach(t => {
    const n = daysTo(t.due);
    if (!t.done && n !== null && n <= 14) soon.push({ n, label: t.label, ctx: 'Step ' + s.num, scope:'steps', cid:s.id, t });
  }));
  actions.forEach(t => {
    const n = daysTo(t.due);
    if (!t.done && n !== null && n <= 14) soon.push({ n, label: t.label, ctx: 'My actions', scope:'actions', cid:'', t });
  });
  soon.sort((a, b) => a.n - b.n);

  const heroDays = next ? next.n : null;
  const heroCls  = heroDays === null ? '' : (heroDays <= 14 ? 'crit' : heroDays <= 45 ? 'warn' : '');

  const estCount = schools.filter(s => s.estimated).length;
  const confCount = schools.length - estCount;

  // The due-soon list respects the 7/14-day chip; the stat box stays a
  // fixed 14-day gauge so its meaning never shifts under you.
  const soonWin = soon.filter(x => x.n <= uiWin);

  // Recommenders not yet submitted, across every active school.

        </div>

            <div class="d ${next.s.estimated ? 'est' : ''}">${fmtDate(next.s.deadline)} · ${esc(next.s.deadlineNote || '')}</div>
            <div style="margin-top:8px"><span class="pill p-${next.s.priority}">${next.s.priority}</span></div>
          </div>` : ''}
      </div>
      <div class="hero-bar">
        <div class="stat">
          <div class="statfill ${overall === 100 ? 'green' : ''}" style="width:${overall}%"></div>
          <div class="k">Overall progress</div><div class="v">${overall}%</div>
        </div>
        <div class="stat">

          <div class="k">Tasks done</div>
          <div class="v">${doneCount}<span style="color:var(--muted);font-size:13px">/${allTasks.length}</span></div>
        </div>

              <div class="pwrap"><div class="pbar ${p === 100 ? 'done' : ''}" style="width:${p}%"></div></div>

  hydrateLogos($('#p-dash'));

/* ---------------- School logos ----------------
   A school's logo comes from one of two places, in this order:

     1. data.logos[id] — an image you picked in Settings. Held as a data
        URL, so it lives in your backup and syncs to your other devices
        like any other field.
     2. ./logos/<school id>.<ext> — a file sitting in the logos folder.
        Every common format is tried in turn, so naming the file
        oxford-said.png works exactly as well as oxford-said.svg.

   Missing both lands on the grey _fallback.svg badge.

   A browser cannot list a directory, which is why step 2 is a probe:
   ask for each extension and keep whichever one loads. The answer is
   cached per session, so the misses only ever happen once per school.
-------------------------------------------------- */
const LOGO_EXTS = ['svg', 'png', 'webp', 'jpg', 'jpeg', 'avif', 'gif'];
const LOGO_FALLBACK = 'logos/_fallback.svg';
const logoFound = {};   // school id -> the folder url that actually loaded

function attachLogo(img, id) {
  const picked = data && data.logos ? data.logos[id] : null;
  if (picked) { img.src = picked; return; }
  if (logoFound[id]) { img.src = logoFound[id]; return; }

  let i = 0;
  const next = () => {
    if (i >= LOGO_EXTS.length) {
      img.onerror = img.onload = null;
      img.src = LOGO_FALLBACK;
      return;
    }
    const url = 'logos/' + id + '.' + LOGO_EXTS[i++];
    img.onerror = next;
    img.onload = () => { img.onerror = img.onload = null; logoFound[id] = url; };
    img.src = url;
  };
  next();
}

function hydrateLogos(root) {
  (root || document).querySelectorAll('img[data-logo]')
    .forEach((img) => attachLogo(img, img.dataset.logo));
}

/* Where a school's logo is currently coming from, for the Settings list. */
function logoOrigin(id) {
  if (data && data.logos && data.logos[id]) return 'picked on a device';
  if (logoFound[id]) return logoFound[id];
  return 'logos/' + id + '.*';
}

/* Anything you pick is redrawn onto a 128x128 canvas before it is stored.
   A phone photo is a couple of megabytes and the whole sync document has a
   1 MB ceiling, so keeping the original would break sync the first time you
   used this. 128px is four times the size the badge is ever drawn at. */
const LOGO_PX = 128;
const LOGO_MAX_CHARS = 120000;     // ~88 KB for any single logo

/* The sync document holds ALL your data and Firestore caps it at 1 MB. The
   tracker itself is about 25 KB, so the logos have to stay well under that
   ceiling — 18 detailed images could otherwise add up to more than a
   megabyte and silently break sync for every device at once. */
const LOGO_BUDGET_CHARS = 600000;  // ~440 KB of logos in total

function logoBytesExcept(skipId) {
  const all = (data && data.logos) || {};
  return Object.keys(all).reduce(
    (n, k) => (k === skipId ? n : n + all[k].length), 0);
}

function readLogoFile(file) {
  return new Promise((resolve, reject) => {
    if (!file.type || !file.type.startsWith('image/')) {
      reject(new Error('not an image')); return;
    }
    const fr = new FileReader();
    fr.onerror = () => reject(new Error('unreadable'));
    fr.onload = () => {
      // A small SVG is already tiny and resolution-independent, so keep it
      // as it is rather than flattening it to pixels. A big one goes
      // through the canvas like everything else.
      if (file.type === 'image/svg+xml' && file.size <= 64 * 1024) {
        resolve(fr.result); return;
      }
      const img = new Image();
      img.onerror = () => reject(new Error('undecodable'));
      img.onload = () => {
        try {
          const c = document.createElement('canvas');
          c.width = c.height = LOGO_PX;
          const ctx = c.getContext('2d');
          const scale = Math.min(LOGO_PX / img.width, LOGO_PX / img.height) || 1;
          const w = img.width * scale, h = img.height * scale;
          ctx.drawImage(img, (LOGO_PX - w) / 2, (LOGO_PX - h) / 2, w, h);
          resolve(c.toDataURL('image/png'));
        } catch (e) { reject(e); }
      };
      img.src = fr.result;
    };
    fr.readAsDataURL(file);
  });
}

let logoTarget = null;

window.__pickLogo = (id) => {

/* Switch a school in or out of the tracker. The settings list is long, so
   hold the scroll position — re-rendering would otherwise throw you back to
   the top every time you flick a switch. */
window.__toggleSchool = (id) => {
  const y = window.scrollY;
  data.excluded = data.excluded || {};
  if (data.excluded[id]) delete data.excluded[id];
  else data.excluded[id] = true;
  save();
  render();
  window.scrollTo({ top: y });
  const s = (data.schools || []).find((x) => x.id === id);
  const name = s ? s.name : 'School';
  toast(isExcluded(id) ? `${name} switched off` : `${name} switched back on`);
};

window.__clearLogo = (id) => {
  if (!data.logos || !data.logos[id]) return;
  delete data.logos[id];
  save();
  render();
  toast('Back to the logos folder for this school');
};

/* The rate field is rebuilt on every render, so listen at the document
   level rather than binding to an element that keeps being replaced.
   'change' (not 'input') means this fires when you finish typing, not on
   every keystroke — re-rendering mid-keystroke would steal the caret. */
document.addEventListener('change', (e) => {
  if (!e.target || e.target.id !== 'fxRate') return;
  const v = parseFloat(e.target.value);
  data.fx = data.fx || {};
  data.fx.ngnPerUsd = isFinite(v) && v > 0 ? v : null;
  save();
  render();
  toast(data.fx.ngnPerUsd
    ? `Rate set — ₦${data.fx.ngnPerUsd.toLocaleString('en-GB')} to $1`
    : 'Naira conversion off');
});

$('#logoFile').addEventListener('change', async (e) => {
  const file = e.target.files && e.target.files[0];
  const id = logoTarget;
  logoTarget = null;
  if (!file || !id) return;
  try {
    const url = await readLogoFile(file);
    if (url.length > LOGO_MAX_CHARS) {
      toast('That image is still too large after resizing');
      return;
    }
    if (logoBytesExcept(id) + url.length > LOGO_BUDGET_CHARS) {
      toast('No room left for more picked logos — reset one first');
      return;
    }
    data.logos = data.logos || {};
    data.logos[id] = url;
    save();
    render();
    toast('Logo updated');
  } catch (err) {
    console.error('Logo import failed', err);
    toast('Could not read that file as an image');
  }
});

/* Task filter — display-only state, like uiWin above. With ~150 tasks
   across 18 cards, scrolling stopped being a search strategy. */
let taskQ = '';                       // free-text match on task labels
let taskMode = 'all';                 // all | open | overdue
window.__setTaskMode = (m) => { taskMode = m; renderSchools(); };

function taskMatches(t) {
  if (taskMode === 'open' && t.done) return false;
  if (taskMode === 'overdue') {
    const n = daysTo(t.due);
    if (t.done || n === null || n >= 0) return false;
  }
  if (taskQ && !t.label.toLowerCase().includes(taskQ.toLowerCase())) return false;
  return true;
}

/* Re-rendering on every keystroke would steal the caret, so the search box
   waits for a pause in typing, then re-renders and puts the caret back. */
let taskQTimer = null;
document.addEventListener('input', (e) => {
  if (!e.target || e.target.id !== 'taskQ') return;
  taskQ = e.target.value;
  clearTimeout(taskQTimer);
  taskQTimer = setTimeout(() => {
    renderSchools();
    const el = $('#taskQ');
    if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
  }, 300);
});
window.__clearTaskQ = () => { taskQ = ''; renderSchools(); };

        <div class="setlbl">
          <b>Device notifications</b>
          <span>Registers this device for a daily push of everything due in the next 7 days — it arrives even when the app is closed. Needs the sending side to be live once: see <b>PUSH-SETUP.md</b> in the app folder (a free GitHub Action, about five minutes).</span>
        </div>
        <button class="setbtn" onclick="__enablePush()">Enable</button>
      </div>
    </div>

    <div class="set">
      <div class="setrow">
        <div class="setlbl">
          <b>Version ${esc(APP_VERSION)}</b>
          <span>Tap the version badge in the header to force a refresh if the app looks out of date. Your data is never touched by that.</span>
        </div>
      </div>
      <div class="setrow">
        <div class="setlbl">
          <b>Sync</b>
          <span>Automatic. Every device running this app shares one Firestore document — there is nothing to switch on and no code to enter. Current status is shown by the dot in the header.</span>
        </div>
      </div>
    </div>`;

  $('#p-settings').insertAdjacentHTML('beforeend', `
    <div class="set">
      <div class="setrow">
        <div class="setlbl">
          <b>Schools and logos</b>
          <span>The switch decides whether a school appears anywhere in the tracker — turn one off after you rule it out and it drops out of every list, count and cost table. Nothing is deleted, so switching it back on brings its ticks and notes back exactly as they were.<br><br>For the logo: drop an image into the logos folder named after the school — svg, png, webp, jpg, jpeg, avif and gif all work — or <b>tap the logo below</b> to pick one from this device. A picked image is resized to 128px, saved with your data and synced to your other devices; a folder image is not, so it has to be added to each device's copy of the app.</span>
        </div>
      </div>
      ${schools.map((s) => {
        const picked = !!(data.logos && data.logos[s.id]);
        const off = isExcluded(s.id);
        return `
        <div class="setrow logorow${off ? ' off' : ''}">
          <button class="logobtn" onclick="__pickLogo('${s.id}')"
                  aria-label="Change the logo for ${esc(s.name)}">
            <img class="logo" data-logo="${s.id}" alt="">
          </button>
          <div class="setlbl">
            <b>${esc(s.name)}</b>
            <span class="logosrc">${off ? 'switched off' : esc(logoOrigin(s.id))}</span>
            ${picked ? `<a class="resetlink" role="button" tabindex="0"
                 onclick="__clearLogo('${s.id}')">use the logos folder instead</a>` : ''}
          </div>
          <button class="switch${off ? '' : ' on'}" role="switch"
                  aria-checked="${off ? 'false' : 'true'}"
                  aria-label="Include ${esc(s.name)} in the tracker"
                  onclick="__toggleSchool('${s.id}')"></button>
        </div>`;
      }).join('')}
    </div>`);

  hydrateLogos($('#p-settings'));
}

/* ---------------- Render ---------------- */
function render() {
  if (!data) return;
  renderDash();
  renderSchools();
  renderSteps();
  renderActions();
  renderMoney();
  renderSettings();
}

/* ---------------- Daily snapshots ----------------
   Once per day, after sync connects, a copy of the whole document is
   written to a per-weekday slot (see sync.js). Rolling back is a normal
   save: the restored data becomes the live document and syncs everywhere. */
function maybeSnapshot() {
  if (!data || !window.EmbaSync) return;
  const stamp = todayISO();
  if (localStorage.getItem('lastSnap') === stamp) return;
  window.EmbaSync.snapshot(data).then((ok) => {
    if (ok) localStorage.setItem('lastSnap', stamp);
  });
}

const DAY_NAMES = { mon:'Monday', tue:'Tuesday', wed:'Wednesday', thu:'Thursday', fri:'Friday', sat:'Saturday', sun:'Sunday' };

window.__snapList = async () => {
  const box = $('#snapList');
  if (!window.EmbaSync || !window.EmbaSync.available()) { toast('Sync is not set up on this device'); return; }
  box.innerHTML = '<div class="setnote">Looking for snapshots…</div>';
  const snaps = await window.EmbaSync.listSnapshots();
  if (!snaps.length) {
    box.innerHTML = '<div class="setnote">No snapshots yet — the first one is written the next time the app opens with sync connected.</div>';
    return;
  }
  box.innerHTML = snaps.map(({ day, updatedAt }) => `
    <div class="setrow">
      <div class="setlbl">
        <b>${DAY_NAMES[day] || day}</b>
        <span class="logosrc">${updatedAt ? new Date(updatedAt).toLocaleString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) : 'unknown time'}</span>
      </div>
      <button class="setbtn" onclick="__snapRestore('${day}')">Restore</button>
    </div>`).join('');
};

window.__snapRestore = async (day) => {
  if (!confirm(`Replace everything with the ${DAY_NAMES[day] || day} snapshot? This syncs to every device.`)) return;
  const payload = await window.EmbaSync.getSnapshot(day);
  if (!payload || !Array.isArray(payload.schools)) { toast('Could not read that snapshot'); return; }
  data = payload;
  migrate(data);
  save();
  render();
  toast(`Rolled back to ${DAY_NAMES[day] || day}'s snapshot`);
};

/* ---------------- Device push ----------------
   The service worker's push handler has been sitting dormant; this is the
   client half that brings it to life. The sending half is a scheduled
   GitHub Action (scripts/send-push.mjs) — free, no Firebase paid plan.
   Until that Action is set up, enabling here stores the subscription and
   nothing arrives; PUSH-SETUP.md walks through the one-time setup. */
const VAPID_PUBLIC_KEY = 'BPL6724MYxNUc0xe53WYxWRTTW-9VJoixE3RU1qdxs9X2Bmss83Nd5oo1rcqsmst3ncC5Z9JZF2lq6_klk5A1E0';

function urlB64ToUint8Array(s) {
  const pad = '='.repeat((4 - (s.length % 4)) % 4);
  const raw = atob((s + pad).replace(/-/g, '+').replace(/_/g, '/'));
  return Uint8Array.from(raw, (c) => c.charCodeAt(0));
}

window.__enablePush = async () => {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    toast('This browser does not support push'); return;
  }
  const perm = await Notification.requestPermission();
  if (perm !== 'granted') { toast('Notifications are blocked in your browser settings'); return; }
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlB64ToUint8Array(VAPID_PUBLIC_KEY),
    });
    const ok = window.EmbaSync && await window.EmbaSync.savePushSub(sub.toJSON());
    toast(ok
      ? 'Device registered — daily reminders will arrive once the GitHub Action is live'
      : 'Subscribed on this device, but saving it for the sender failed');
  } catch (e) {
    console.error('Push subscribe failed', e);
    toast('Could not subscribe this device for push');
  }
};

/* ---------------- Reminders ----------------
   Browser notifications fire only while this page is open in a tab.
   For push when the app is closed, see the Device notifications row in
   Settings and PUSH-SETUP.md.
-------------------------------------------- */
$('#notify').addEventListener('click', async () => {
  if (!('Notification' in window)) { toast('This browser does not support notifications'); return; }
  const perm = await Notification.requestPermission();
  if (perm !== 'granted') { toast('Notifications are blocked in your browser settings'); return; }
  toast('Reminders on while this tab is open');
  checkDue(true);
});

function checkDue(force = false) {
  if (!data || Notification.permission !== 'granted') return;
  const stamp = todayISO();
  if (!force && localStorage.getItem('lastNotify') === stamp) return;

  const soon = [];
  activeSchools().forEach(s => (s.tasks || []).forEach(t => {
    const n = daysTo(t.due);
    if (!t.done && n !== null && n <= 7) soon.push(`${s.name}: ${t.label}`);
  }));
  (data.actions || []).forEach(t => {
    const n = daysTo(t.due);
    if (!t.done && n !== null && n <= 7) soon.push(t.label);
  });

  if (soon.length) {
    new Notification(`${soon.length} EMBA task${soon.length > 1 ? 's' : ''} due within 7 days`, {
      body: soon.slice(0, 3).join('\n') + (soon.length > 3 ? `\n…and ${soon.length - 3} more` : ''),
      tag: 'emba-due'
    });
    localStorage.setItem('lastNotify', stamp);
  }
}
setInterval(() => checkDue(false), 60 * 60 * 1000);
document.addEventListener('visibilitychange', () => { if (!document.hidden) checkDue(false); });

/* ---------------- Go ---------------- */
start();

/* ---------------- Service worker ----------------
   Registers the offline shell cache. Runs only over http(s),
   so it silently no-ops on file:// when opened directly.
-------------------------------------------------- */
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch((e) => {
      console.warn('Service worker registration failed:', e);
    });
  });
}
</script>
</body>
